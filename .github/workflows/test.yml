name: Tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Syntax check
        run: bash -n auto-update.sh && bash -n install.sh

      - name: ShellCheck
        run: shellcheck auto-update.sh install.sh

      - name: Run bats tests
        run: bats tests/
